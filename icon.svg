<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#6C3CE1"/>
  
  <!-- Letter L — centered with symmetric horizontal bounds -->
